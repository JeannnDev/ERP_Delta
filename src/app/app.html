@if (loadingService.isLoading()) {
<po-loading-overlay [p-screen-lock]="true" p-text="Carregando"></po-loading-overlay>
}

<div class="po-wrapper">
  <po-toolbar p-title="ERP Delta" [p-show-notification]="false"></po-toolbar>

  <po-menu 
    p-logo="logo.svg" 
    p-short-logo="mini-logo.svg"
    [p-menus]="menus" 
    [p-collapsed]="isMenuCollapsed()"
    [p-filter]="!isMenuCollapsed()"
  >
  </po-menu>

  <router-outlet></router-outlet>
</div>
