<po-page-default 
  p-title="Resultado da Importação"
  [p-actions]="[
    { label: 'Nova Importação', action: voltar.bind(this), icon: 'po-icon-refresh' }
  ]">

  @if (resultado) {
    <div class="po-row">
      <div class="po-md-3">
        <po-info p-label="Total do CSV" [p-value]="(resultado.total || 0) + ''"></po-info>
      </div>
      <div class="po-md-3">
        <po-info p-label="Sucesso" [p-value]="(resultado.sucesso || 0) + ''"></po-info>
      </div>
      <div class="po-md-3">
        <po-info p-label="Erros" [p-value]="(resultado.erros || 0) + ''"></po-info>
      </div>
      <div class="po-md-3">
        <po-info p-label="Duplicados" [p-value]="(resultado.duplicados || 0) + ''"></po-info>
      </div>
    </div>
  }

  <po-divider p-label="Detalhamento do Processamento"></po-divider>

  @if (resultado) {
    <div class="po-row">
      <div class="po-md-12">
        <po-table 
          [p-columns]="tableColumns" 
          [p-items]="resultado.itens || []"
          p-striped="true">
        </po-table>
      </div>
    </div>
  }

</po-page-default>
